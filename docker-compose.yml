version: "3.9"

services:
  api:
    container_name: chatbot-api
    build:
      context: ./packages/backend
      target: development
    ports:
      - "${API_PORT:-4000}:3000"
      - "9229:9229"
    env_file: .env
    networks:
      - db-network
      - app-network
    volumes:
      - ./packages/backend/src:/app/src
      - ./packages/backend/test:/app/test
      - api-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: "wget --spider http://localhost:3000 || exit 1"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    container_name: chatbot-frontend
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      target: development
    ports:
      - "${APP_FRONTEND_PORT:-8080}:8080"
    env_file: .env
    networks:
      - app-network
    volumes:
      - ./packages/frontend:/app/frontend
      - ./packages/widget:/app/widget
    depends_on:
      api:
        condition: service_healthy

  mongo:
    container_name: chatbot-mongo
    image: mongo:7.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-dev_only}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dev_only}
    networks:
      - db-network
    healthcheck:
      test: echo 'db.stats().ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - mongo-data:/data/db

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: megh-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    networks:
      - app-network
      - monitoring-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: megh-grafana
    ports:
      - "3002:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: megh-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    networks:
      - monitoring-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: megh-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    networks:
      - monitoring-network
    restart: unless-stopped

volumes:
  mongo-data:
  api-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  db-network:
  app-network:
  monitoring-network:
