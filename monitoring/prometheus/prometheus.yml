global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'megh-backend'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['backend:3000']
        labels:
          service: 'megh-backend'
          environment: 'production'

  - job_name: 'megh-frontend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['frontend:3001']
        labels:
          service: 'megh-frontend'
          environment: 'production'

  - job_name: 'megh-ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8000']
        labels:
          service: 'megh-ai-service'
          environment: 'production'

  - job_name: 'megh-database'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'megh-database'
          environment: 'production'

  - job_name: 'megh-redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'megh-redis'
          environment: 'production'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'megh-infrastructure'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

rule_files:
  - 'alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
